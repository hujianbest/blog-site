spring:
  application:
    name: writing-platform

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:writingplatform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console

  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Application Configuration
app:
  jwt:
    secret: YourSuperSecretKeyForJWTTokenGenerationShouldBeLongEnough123456
    expiration: 86400000 # 24 hours in milliseconds
  upload:
    dir: ./uploads

# Logging
logging:
  level:
    com.example.writingplatform: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# SpringDoc Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
